lesson:
  id: distributive-candy-bags
  title: Distributive Candy Bags
  language: zh-CN
  format: browser-deck
  audience:
    age_range: 8-11
    mode: teacher-led, image-first
  learning_goal: Understand the distributive property by combining equal-sized candy bags.

concept:
  name: Distributive property
  concrete_model: dad brings 3 candy bags, mom brings 5 candy bags, every bag has 6 candies
  transformation: separate counts -> notice same bag size -> combine bag counts -> multiply once

example:
  separate_count: 3 * 6 + 5 * 6
  combined_count: (3 + 5) * 6
  total: 48

abstraction:
  formula: a * n + b * n = (a + b) * n
  key_condition: the shared multiplier must be the same

run:
  entry: index.html
  controls: right arrow, left arrow, space, click, fullscreen with F
