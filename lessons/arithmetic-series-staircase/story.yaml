lesson:
  id: arithmetic-series-staircase
  title: Arithmetic Series Staircase
  language: zh-CN
  format: browser-deck
  audience:
    age_range: 8-11
    mode: teacher-led, image-first
  learning_goal: Understand arithmetic series sum through a staircase-to-rectangle transformation.

concept:
  name: Arithmetic series
  concrete_model: 8-step staircase made of square blocks
  transformation: staircase -> copied staircase -> rotated copy -> snapped rectangle -> divide by two -> formula

visual_design:
  principle: simple blocks over decorative art
  key_animation: copied staircase rotates and moves into the missing space to form an 8 by 9 rectangle
  reason: the learner should see why the division by 2 is necessary

example:
  sequence: 1 + 2 + 3 + 4 + 5 + 6 + 7 + 8
  rectangle:
    rows: 8
    columns: 9
    total_for_two_staircases: 72
  one_staircase_sum: 36

run:
  entry: index.html
  controls: right arrow, left arrow, space, click, fullscreen with F, replay button on transformation slide
