lesson:
  id: triangle-area-rectangle-cut
  title: Triangle Area: Rectangle Cut
  language: zh-CN
  format: browser-deck
  audience:
    age_range: 8-11
    mode: teacher-led, image-first
  learning_goal: Understand triangle area through cutting a rectangle and splitting an ordinary triangle.

concept:
  name: Triangle area
  concrete_model: rectangle cut by a diagonal
  transformation: rectangle -> diagonal cut -> two equal right triangles -> half rectangle -> base times height divided by two

extension:
  model: ordinary triangle split by height
  transformation: ordinary triangle -> height line -> two right triangles -> combined base -> base times height divided by two

run:
  entry: index.html
  controls: right arrow, left arrow, space, click, fullscreen with F
