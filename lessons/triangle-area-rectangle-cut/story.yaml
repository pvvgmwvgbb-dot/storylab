lesson:
  id: triangle-area-rectangle-cut
  title: Triangle Area: Complete to Rectangle
  language: zh-CN
  format: browser-deck
  audience:
    age_range: 8-11
    mode: teacher-led, image-first
  learning_goal: Understand triangle area by completing a triangle into a familiar rectangle.

concept:
  name: Triangle area
  concrete_model: right triangle completed with its matching half
  transformation: hard-to-calculate triangle -> add matching half -> rectangle -> rectangle area divided by two

extension:
  model: ordinary triangle split by height
  transformation: ordinary triangle -> height line -> two right triangles -> each side completes to a rectangle -> combined base times same height divided by two

visual_design:
  principle: formula must stay attached to the reference shape
  avoid: formula-only conclusion pages
  key_memory: a triangle is half of a completed rectangle

run:
  entry: index.html
  controls: right arrow, left arrow, space, click, fullscreen with F
