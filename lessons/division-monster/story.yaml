lesson:
  id: division-monster
  title: Division Monster
  language: zh-CN
  format: browser-deck
  audience:
    age_range: 7-10
    mode: teacher-led, image-first
  learning_goal: Understand division and remainder through repeated taking away.

concept:
  name: Division
  concrete_model: monster eating a fixed number of candies per bite
  transformation: total objects -> fixed group size -> repeated taking away -> quotient -> remainder

run:
  entry: index.html
  controls: right arrow, left arrow, space, click, fullscreen with F
